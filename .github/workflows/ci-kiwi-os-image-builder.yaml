name: Build the certified openSUSE Leap 15.6 image for SUSE AI TF

on:
  workflow_dispatch:

env:
  IMAGE_NAME: opensuse-leap-15-6-suse-ai-tf-cloud-image.x86_64
  BUILD_DIR: ${{ github.workspace }}/modules/kiwi-os-image-builder

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure Docker to use btrfs storage driver
        run: |
          sudo systemctl stop docker
          sudo apt-get install -y qemu-utils btrfs-progs
          sudo qemu-img create /var/lib/docker-storage.btrfs 20g
          sudo mkfs.btrfs -f /var/lib/docker-storage.btrfs
          sudo mount /var/lib/docker-storage.btrfs /var/lib/docker
          echo '{"storage-driver": "btrfs"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          sudo docker info | grep "Storage Driver"

      - name: Build OEM disk image with KIWI
        run: |
          docker run --rm --privileged --platform linux/amd64 \
            -v /dev:/dev \
            -v "${BUILD_DIR}":/build opensuse/leap:15.6 bash -c "
              zypper addrepo http://download.opensuse.org/repositories/Virtualization:/Appliances:/Builder/openSUSE_Leap_15.6 kiwi &&
              zypper --gpg-auto-import-keys refresh &&
              zypper in -y python311-kiwi git binutils qemu-tools squashfs dosfstools e2fsprogs gptfdisk systemd &&
              kiwi system build --description /build --set-repo https://download.opensuse.org/distribution/leap/15.6/repo/oss --target-dir /tmp/kiwi-outputs/ &&
              cp /tmp/kiwi-outputs/*.qcow2 /build/${IMAGE_NAME}.qcow2 &&
              cp /tmp/kiwi-outputs/*.raw /build/${IMAGE_NAME}.raw
            "

      - name: Fix output file ownership
        run: |
          sudo chown runner:runner "${BUILD_DIR}/${IMAGE_NAME}.qcow2"
          sudo chown runner:runner "${BUILD_DIR}/${IMAGE_NAME}.raw"

      - name: Install qemu-utils and tools
        run: sudo apt update && sudo apt install -y qemu-utils jq bzip2 tar

      - name: Convert RAW to VHD
        run: |
          RAW_PATH="${BUILD_DIR}/${IMAGE_NAME}.raw"
          VHD_PATH="${BUILD_DIR}/${IMAGE_NAME}.vhd"
          MB=$((1024 * 1024))
          SIZE=$(qemu-img info -f raw --output json "$RAW_PATH" | jq -r '.["virtual-size"]')
          ROUNDED_SIZE=$(( ($SIZE / $MB + 1) * $MB ))
          qemu-img resize -f raw "$RAW_PATH" "$ROUNDED_SIZE"
          qemu-img convert -f raw -O vpc -o subformat=fixed,force_size "$RAW_PATH" "$VHD_PATH"

      - name: Prepare RAW for Google Cloud
        run: |
          RAW_PATH="${BUILD_DIR}/${IMAGE_NAME}.raw"
          OUT_DIR="${BUILD_DIR}"
          cp "$RAW_PATH" "${OUT_DIR}/disk.raw"
          tar --format=oldgnu -C "$OUT_DIR" -czf "${OUT_DIR}/${IMAGE_NAME}.raw.tar.gz" disk.raw
          rm "${OUT_DIR}/disk.raw"

      - name: List files before upload
        run: ls -lh "${BUILD_DIR}"

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: suse-ai-tf-os-image
          path: |
            ${{ env.BUILD_DIR }}/${{ env.IMAGE_NAME }}.qcow2
            ${{ env.BUILD_DIR }}/${{ env.IMAGE_NAME }}.vhd
            ${{ env.BUILD_DIR }}/${{ env.IMAGE_NAME }}.raw.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download artifact from build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: suse-ai-tf-os-image
          path: ./artifact

      - name: Install GitHub CLI
        run: sudo apt update && sudo apt install -y gh

      - name: Create Release
        run: |
          gh release create "build-${GITHUB_RUN_NUMBER}" \
            ./artifact/${{ env.IMAGE_NAME }}.qcow2 \
            ./artifact/${{ env.IMAGE_NAME }}.vhd \
            ./artifact/${{ env.IMAGE_NAME }}.raw.tar.gz \
            --title "Certified openSUSE Leap 15.6 image for suse-ai-tf - build-${GITHUB_RUN_NUMBER}" \
            --notes "Release automatically generated by GitHub Actions."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
