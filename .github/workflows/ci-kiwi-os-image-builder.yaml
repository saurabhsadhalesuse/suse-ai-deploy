name: Build the certified openSUSE Leap 15.6 image for SUSE AI TF

on:
  workflow_dispatch:

env:
  IMAGE_NAME: opensuse-leap-15-6-suse-ai-tf-cloud-image.x86_64
  BUILD_DIR: ${{ github.workspace }}/modules/kiwi-os-image-builder

jobs:
  build:
    runs-on: ubuntu-24.04 # Use specific version for stability
    steps:
      - uses: actions/checkout@v4

      - name: Add OBS KIWI Repository & Install Tools
        run: |
          curl -fsSL https://download.opensuse.org/repositories/Virtualization:/Appliances:/Builder/xUbuntu_24.04/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/kiwi.gpg
          echo 'deb [signed-by=/etc/apt/keyrings/kiwi.gpg] https://download.opensuse.org/repositories/Virtualization:/Appliances:/Builder/xUbuntu_24.04/ /' | sudo tee /etc/apt/sources.list.d/kiwi.list
          sudo apt-get update
          # Combined all installs to save time
          sudo apt-get install -y curl gpg binutils qemu-utils jq bzip2 tar xorriso dosfstools e2fsprogs python3-kiwi rpm zypper

      - name: Initialize RPM Database
        run: sudo rpm --initdb
             sudo rm -rf /var/cache/kiwi/zypper
      
      - name: Build Image with KIWI
        run: |
          mkdir -p /tmp/kiwi-outputs
          # Build the image
          sudo kiwi-ng system build \
            --description "${{ env.BUILD_DIR }}" \
            --set-repo https://download.opensuse.org/distribution/leap/15.6/repo/oss \
            --target-dir /tmp/kiwi-outputs/
          
          # Find the .raw file (KIWI naming can vary slightly, so we use a wildcard)
          cp /tmp/kiwi-outputs/*.raw "${{ env.BUILD_DIR }}/${{ env.IMAGE_NAME }}.raw"

      - name: Convert RAW to VHD
        run: |
          # Use GitHub env syntax to ensure paths are correct
          RAW_PATH="${{ env.BUILD_DIR }}/${{ env.IMAGE_NAME }}.raw"
          VHD_PATH="${{ env.BUILD_DIR }}/${{ env.IMAGE_NAME }}.vhd"
          qemu-img convert -f raw -O vpc -o subformat=fixed,force_size "$RAW_PATH" "$VHD_PATH"
      
      - name: Prepare RAW for Google Cloud
        run: |
          RAW_PATH="${{ env.BUILD_DIR }}/${{ env.IMAGE_NAME }}.raw"
          OUT_DIR="${{ env.BUILD_DIR }}"
          cp "$RAW_PATH" "${OUT_DIR}/disk.raw"
          tar --format=oldgnu -C "$OUT_DIR" -czf "${OUT_DIR}/${{ env.IMAGE_NAME }}.raw.tar.gz" disk.raw
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: suse-ai-tf-os-image
          path: |
            ${{ env.BUILD_DIR }}/${{ env.IMAGE_NAME }}.vhd
            ${{ env.BUILD_DIR }}/${{ env.IMAGE_NAME }}.raw.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: suse-ai-tf-os-image
          path: ./artifact
      - name: Create Release
        run: |
          # Note: IMAGE_NAME must be manually typed or redeclared here
          IMAGE_NAME="opensuse-leap-15-6-suse-ai-tf-cloud-image.x86_64"
          gh release create "build-${GITHUB_RUN_NUMBER}" \
            ./artifact/$IMAGE_NAME.vhd \
            ./artifact/$IMAGE_NAME.raw.tar.gz \
            --title "Certified openSUSE Leap 15.6 image - build-${GITHUB_RUN_NUMBER}" \
            --notes "Native Ubuntu build."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
